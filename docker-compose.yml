services:
  postgres:
    image: postgres:16
    container_name: coffee_code_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coffee_code_db
      POSTGRES_USER: coffee_user
      POSTGRES_PASSWORD: coffee_pass
    ports:
      - "5432:5432"
    volumes:
      - coffee_code_postgres_data:/var/lib/postgresql/data
      - ./BaseDatos/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee_user -d coffee_code_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  coffee_code_postgres_data:
